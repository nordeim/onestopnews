# All services run in containers. Nginx terminates HTTPS on 443 and proxies to
# the Next.js frontend. The frontend's BFF proxy forwards API calls to the
# Django backend.
#
# IMPORTANT: Generate self‑signed certs before first boot:
#   mkdir -p nginx/certs
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout nginx/certs/server.key \
#     -out nginx/certs/server.crt \
#     -subj "/C=SG/ST=Singapore/L=Singapore/O=Luxeverse/CN=localhost"
# =============================================================================

services:
  # ==========================================================================
  # PostgreSQL 17 – Database (unchanged from working state)
  # ==========================================================================
  postgres:
    image: postgres:17-trixie   # consider switching to postgres:17-alpine for consistency
    container_name: onestopnews-postgres
    environment:
      POSTGRES_DB: onestopnews_db
      POSTGRES_USER: onestopnews_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-onestopnews_dev_password}
      POSTGRES_HOST_AUTH_METHOD: trust          # dev‑only trust mode
      TZ: Asia/Singapore
      PGDATA: /var/lib/postgresql/data/pgdata
    command: >
      postgres
      -c timezone=Asia/Singapore
      -c log_destination=stderr
      -c logging_collector=off
      -c log_min_messages=warning
      -c wal_level=replica
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
    ports:
      - "127.0.0.1:5432:5432"   # bind only to loopback for local tooling
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$(echo $$POSTGRES_USER 2>/dev/null || echo onestopnews_user)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - onestopnews-network
    restart: unless-stopped

  # ==========================================================================
  # Redis 7.4 – Cache / Sessions / Broker (unchanged)
  # ==========================================================================
  redis:
    image: redis:7.4-alpine
    container_name: onestopnews-redis
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --save 60 1000
      --loglevel warning
    ports:
      - "0.0.0.0:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - onestopnews-network
    restart: unless-stopped

  # ==========================================================================
  # Next.js 16 Frontend
  # ==========================================================================
  frontend:
    build:
      context: ../
      dockerfile: ./docker/Dockerfile.sample.dev
    container_name: onestopnews-frontend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://onestopnews_user:${DB_PASSWORD:-onestopnews_dev_password}@postgres:5432/onestopnews_db
      NEXTAUTH_URL: http://localhost:3000
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    # Do NOT publish 3000 to the host – nginx will proxy HTTPS
    expose:
      - "3000"
    volumes:
      - ../:/app
      - /app/node_modules
      - /app/apps/web/.next
    depends_on:
      - postgres
      - redis
    networks:
      - onestopnews-network
    restart: unless-stopped
    command: ["npm", "run", "dev"]

  # ==========================================================================
  # Nginx 1.x – SSL Termination, reverse proxy to Next.js
  # ==========================================================================
  nginx:
    image: nginx:1-alpine
    container_name: onestopnews-nginx
    ports:
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
    networks:
      - onestopnews-network
    restart: unless-stopped

# =============================================================================
# Named Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  onestopnews-network:
    driver: bridge
