# nginx/nginx.conf — Reverse proxy config for OneStopNews.
#
# Phase 19 (High H8): Previously this file was missing — the
# docker-compose-nginx.yml bind-mounted it but the file didn't exist,
# so Docker would create an empty directory instead, breaking the
# nginx container at startup.
#
# This config provides:
#   - HTTPS termination with self-signed certificates (from nginx/certs/)
#   - HTTP/2 for performance
#   - Reverse proxy to the Next.js web service (web:3000)
#   - WebSocket upgrade support (for hot reload in dev, HMR, etc.)
#   - Standard proxy headers (Host, X-Real-IP, X-Forwarded-For, X-Forwarded-Proto)
#   - Security headers (HSTS, X-Content-Type-Options, X-Frame-Options, Referrer-Policy)
#
# Usage:
#   docker compose -f docker-compose-dev.yml -f docker-compose-nginx.yml up -d
#   → access https://localhost:8443
#
# Generate self-signed certs before first use:
#   mkdir -p nginx/certs
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout nginx/certs/server.key -out nginx/certs/server.crt \
#     -subj "/C=SG/ST=Singapore/L=Singapore/O=OneStopNews/CN=localhost"

server {
    listen 443 ssl http2;
    server_name localhost;

    # SSL certificates (bind-mounted from nginx/certs/)
    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # Modern TLS configuration (Mozilla Intermediate compatibility, May 2024)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS — tells browsers to only use HTTPS for this site for 2 years.
    # This complements (and is more reliable than) the HSTS header that
    # could be set in next.config.ts — when behind nginx, the Next.js
    # headers may be stripped by the proxy unless explicitly forwarded.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Security headers (defense in depth with Next.js's own headers)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Reverse proxy to the Next.js web service.
    # The `web` service name resolves via Docker's internal DNS.
    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;

        # WebSocket upgrade support (needed for Next.js HMR in dev)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers — passed through so the Next.js app
        # sees the original client IP and protocol.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Don't cache WebSocket upgrades
        proxy_cache_bypass $http_upgrade;

        # Timeouts — generous to accommodate long-running SSR requests
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Health check endpoint — short-circuit the proxy and return 200
    # directly from nginx (so we can detect nginx itself being up vs.
    # the backend being up).
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}

